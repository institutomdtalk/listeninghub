<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening Hub — MD Talk</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:       #0B1D3A;
  --navy-deep:  #050D1A;
  --navy-mid:   #0F2645;
  --navy-light: #163158;
  --gold:       #C4A45A;
  --gold-light: #D4BA7A;
  --gold-pale:  #E8D9B0;
  --bg:         #F8F5EE;
  --bg-card:    rgba(248,245,238,.92);
  --bg-open:    rgba(255,255,255,.96);
  --bg-hover:   rgba(237,232,220,.95);
  --text:       #0B1D3A;
  --text-mid:   rgba(11,29,58,.60);
  --text-muted: rgba(11,29,58,.38);
  --border:     rgba(11,29,58,.10);
  --border-gold:rgba(196,164,90,.35);
  --correct:    #3a9e6f;
  --incorrect:  #b84e39;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }

body {
  background: #07111f;
  color: var(--text);
  overflow-x: hidden;
  font-family: 'Raleway', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}






/* ─── HEADER ─── */
.site-header {
  position: relative;
  z-index: 20;
  padding: 3rem 3rem 2rem;
  max-width: 980px;
  margin: 0 auto;
}
.header-eyebrow {
  display: flex;
  align-items: center;
  gap: .75rem;
  margin-bottom: 1.4rem;
}
.eyebrow-line {
  width: 32px;
  height: 1px;
  background: var(--gold);
  opacity: .7;
}
.eyebrow-text {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .28em;
  text-transform: uppercase;
  color: var(--gold);
}
.header-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.6rem, 5.5vw, 4rem);
  font-weight: 300;
  line-height: 1.05;
  color: #F8F5EE;
  letter-spacing: -.01em;
}
.header-title em {
  font-style: italic;
  color: var(--gold);
}
.header-sub {
  margin-top: .9rem;
  font-size: .8rem;
  font-weight: 300;
  color: rgba(248,245,238,.65);
  line-height: 1.7;
  max-width: 480px;
  letter-spacing: .02em;
}
.header-rule {
  margin-top: 2rem;
  height: 1px;
  background: linear-gradient(90deg, var(--gold) 0%, rgba(196,164,90,.25) 60%, transparent 100%);
}

/* ─── CONTROLS BAR ─── */
.controls-bar {
  position: relative;
  z-index: 20;
  max-width: 980px;
  margin: 1.8rem auto 0;
  padding: 0 3rem;
  display: flex;
  align-items: center;
  gap: 1.2rem;
  flex-wrap: wrap;
}
.controls-search {
  flex: 1;
  min-width: 200px;
  max-width: 320px;
  position: relative;
}
.controls-search svg {
  position: absolute;
  left: .85rem;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  stroke: var(--text-muted);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
}
.search-input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Raleway', sans-serif;
  font-size: .76rem;
  font-weight: 400;
  padding: .6rem .9rem .6rem 2.4rem;
  border-radius: 8px;
  outline: none;
  transition: border-color .2s, background .2s;
  letter-spacing: .03em;
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus {
  border-color: var(--gold);
  background: var(--bg-open);
}
.filter-pills {
  display: flex;
  gap: .45rem;
  flex-wrap: wrap;
  align-items: center;
}
.filter-sep {
  width: 1px;
  height: 20px;
  background: var(--border-gold);
}
.pill {
  background: transparent;
  border: 1px solid var(--border-gold);
  color: var(--text-muted);
  font-family: 'Raleway', sans-serif;
  font-size: .67rem;
  font-weight: 600;
  letter-spacing: .14em;
  text-transform: uppercase;
  padding: .38rem .85rem;
  border-radius: 100px;
  cursor: pointer;
  transition: all .2s ease;
}
.pill:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(196,164,90,.07);
}
.pill.active {
  background: var(--navy);
  border-color: var(--navy);
  color: var(--gold-pale);
}

/* ─── MAIN ─── */
.main {
  position: relative;
  z-index: 20;
  max-width: 980px;
  margin: 2.5rem auto 5rem;
  padding: 0 3rem;
}

/* ─── LEVEL SECTION ─── */
.level-section {
  margin-bottom: 3.5rem;
}
.level-heading {
  display: flex;
  align-items: baseline;
  gap: 1.1rem;
  margin-bottom: 1.8rem;
  padding-bottom: .9rem;
  border-bottom: 1px solid var(--border-gold);
}
.level-code {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.5rem, 3vw, 2.2rem);
  font-weight: 300;
  color: var(--gold);
  line-height: 1;
  letter-spacing: -.01em;
  font-style: italic;
}
.level-info {
  display: flex;
  flex-direction: column;
  gap: .1rem;
}
.level-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-weight: 400;
  font-style: italic;
  color: rgba(248,245,238,.55);
}
.level-count {
  font-size: .65rem;
  font-weight: 600;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: rgba(248,245,238,.35);
}
.level-divider {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border-gold), transparent);
  align-self: center;
}

/* ─── AUDIO GRID ─── */
.audio-grid {
  display: grid;
  grid-template-columns: 1fr;
  border: 1px solid var(--border-gold);
  border-radius: 14px;
  overflow: hidden;
}

/* ─── AUDIO CARD ─── */
.audio-card {
  background: var(--bg-card);
  position: relative;
  transition: background .2s ease;
}
.audio-card + .audio-card {
  border-top: 1px solid var(--border);
}
.audio-card.is-open {
  background: var(--bg-open);
}

/* clickable header row */
.card-header-row {
  display: flex;
  align-items: center;
  gap: .85rem;
  padding: 1rem 1.4rem 1rem 1.5rem;
  cursor: pointer;
  user-select: none;
  transition: background .18s ease;
  min-height: 54px;
}
.card-header-row:hover {
  background: var(--bg-hover);
}

.card-title {
  flex: 1;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15rem;
  font-weight: 400;
  color: var(--navy-deep);
  line-height: 1.3;
  letter-spacing: .01em;
}
.card-chevron {
  flex-shrink: 0;
  width: 13px;
  height: 13px;
  stroke: var(--text-muted);
  fill: none;
  stroke-width: 2.2;
  transition: transform .3s ease, stroke .2s;
}
.audio-card.is-open .card-chevron {
  transform: rotate(180deg);
  stroke: var(--gold);
}
.card-header-row:hover .card-chevron { stroke: var(--navy); }

/* the collapsible body */
.card-collapsible {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height .42s cubic-bezier(.4,0,.2,1), opacity .28s ease;
  background: var(--bg-open);
  border-top: 1px solid var(--border);
}
.audio-card.is-open .card-collapsible {
  max-height: 1200px;
  opacity: 1;
}

/* desc inside collapsible */
.card-desc {
  font-size: .74rem;
  font-weight: 400;
  color: var(--text-mid);
  line-height: 1.65;
  letter-spacing: .02em;
  padding: 1rem 1.5rem .5rem;
}

/* waveform decoration */
.card-wave {
  width: 38px;
  height: 20px;
  opacity: .2;
  flex-shrink: 0;
}

/* ─── CUSTOM PLAYER ─── */
.card-player-section {
  padding: 1rem 1.5rem 1.2rem;
}
.player-wrap {
  display: flex;
  align-items: center;
  gap: 1rem;
}
.btn-play {
  flex-shrink: 0;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--navy);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s ease, transform .15s ease;
}
.btn-play:hover { background: var(--navy-light); transform: scale(1.06); }
.btn-play:active { transform: scale(.96); }
.btn-play svg {
  width: 15px;
  height: 15px;
  fill: var(--gold);
  flex-shrink: 0;
}
.player-controls {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: .5rem;
}
.progress-track {
  position: relative;
  width: 100%;
  height: 3px;
  background: rgba(11,29,58,.12);
  border-radius: 100px;
  cursor: pointer;
}
.progress-fill {
  height: 100%;
  background: var(--navy);
  border-radius: 100px;
  width: 0%;
  transition: width .1s linear;
  pointer-events: none;
}
.progress-thumb {
  position: absolute;
  top: 50%;
  transform: translateY(-50%) translateX(-50%);
  width: 11px;
  height: 11px;
  background: var(--navy);
  border-radius: 50%;
  left: 0%;
  pointer-events: none;
  opacity: 0;
  transition: opacity .15s;
}
.progress-track:hover .progress-thumb { opacity: 1; }
.player-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.player-time {
  font-size: .67rem;
  font-weight: 400;
  color: var(--text-muted);
  letter-spacing: .05em;
  font-variant-numeric: tabular-nums;
}
.player-speed {
  font-size: .65rem;
  font-weight: 600;
  letter-spacing: .1em;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'Raleway', sans-serif;
  padding: .18rem .5rem;
  border-radius: 6px;
  cursor: pointer;
  transition: border-color .2s, color .2s;
}
.player-speed:hover { border-color: var(--navy); color: var(--navy); }

/* ─── CARD FOOTER ACTIONS ─── */
.card-footer {
  display: flex;
  gap: .5rem;
  padding: 0 1.5rem 1.2rem;
  flex-wrap: wrap;
}
.btn-expand {
  display: flex;
  align-items: center;
  gap: .5rem;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'Raleway', sans-serif;
  font-size: .63rem;
  font-weight: 600;
  letter-spacing: .14em;
  text-transform: uppercase;
  padding: .4rem .95rem;
  border-radius: 6px;
  cursor: pointer;
  transition: all .2s ease;
}
.btn-expand:hover {
  border-color: var(--navy);
  color: var(--navy);
  background: rgba(11,29,58,.04);
}
.btn-expand.active {
  border-color: var(--navy);
  color: var(--navy);
  background: rgba(11,29,58,.06);
}
.btn-expand svg {
  width: 10px;
  height: 10px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2.2;
  transition: transform .25s ease;
  flex-shrink: 0;
}
.btn-expand.active svg { transform: rotate(180deg); }

/* ─── EXPANDABLE PANELS ─── */
.panel {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height .45s cubic-bezier(.4,0,.2,1), opacity .3s ease;
}
.panel.open {
  max-height: 1000px;
  opacity: 1;
}
.panel-inner {
  padding: 0 1.5rem 1.5rem;
  border-top: 1px solid var(--border);
}
.panel-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: .24em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: .75rem;
  margin-top: 1rem;
  display: flex;
  align-items: center;
  gap: .55rem;
}
.panel-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-gold);
}

.transcript-body {
  font-size: .77rem;
  font-weight: 400;
  color: var(--text-mid);
  line-height: 1.9;
  letter-spacing: .025em;
  border-left: 2px solid var(--gold);
  padding-left: 1rem;
  white-space: pre-wrap;
}

/* ─── QUESTIONS ─── */
.question-item {
  margin-bottom: 1.25rem;
}
.question-item:last-child { margin-bottom: 0; }
.question-text {
  font-size: .79rem;
  font-weight: 400;
  color: var(--text);
  line-height: 1.55;
  margin-bottom: .6rem;
}
.q-num {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--gold);
  margin-right: .35rem;
  font-size: .95rem;
}
.answer-row {
  display: flex;
  gap: .6rem;
  align-items: center;
  flex-wrap: wrap;
}
.answer-input {
  flex: 1;
  min-width: 160px;
  background: #07111f;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'Raleway', sans-serif;
  font-size: .74rem;
  font-weight: 400;
  padding: .5rem .9rem;
  outline: none;
  transition: border-color .2s, background .2s;
  letter-spacing: .02em;
}
.answer-input::placeholder { color: var(--text-muted); }
.answer-input:focus { border-color: var(--navy); background: var(--bg-open); }
.answer-input.correct { border-color: var(--correct); background: rgba(58,158,111,.07); }
.answer-input.incorrect { border-color: var(--incorrect); background: rgba(184,78,57,.06); }
.btn-check {
  background: var(--navy);
  border: 1px solid var(--navy);
  color: var(--gold-pale);
  font-family: 'Raleway', sans-serif;
  font-size: .63rem;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: .5rem 1rem;
  border-radius: 6px;
  cursor: pointer;
  transition: all .18s ease;
  white-space: nowrap;
}
.btn-check:hover { background: var(--navy-light); border-color: var(--navy-light); }
.answer-fb {
  font-size: .68rem;
  font-weight: 500;
  letter-spacing: .05em;
  min-height: .9rem;
  margin-top: .3rem;
}
.answer-fb.correct { color: var(--correct); }
.answer-fb.incorrect { color: var(--incorrect); }

/* score banner */
.score-banner {
  display: none;
  align-items: center;
  gap: 1rem;
  background: rgba(11,29,58,.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: .8rem 1.1rem;
  margin-top: .9rem;
}
.score-banner.show { display: flex; }
.score-big {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  font-weight: 300;
  color: var(--navy);
  line-height: 1;
  white-space: nowrap;
}
.score-msg {
  font-size: .72rem;
  font-weight: 400;
  color: var(--text-mid);
  line-height: 1.5;
}

/* ─── STATES ─── */
.state-container {
  padding: 4rem 0;
  text-align: center;
}
.spinner {
  width: 32px;
  height: 32px;
  border: 1.5px solid rgba(11,29,58,.12);
  border-top-color: var(--navy);
  border-radius: 50%;
  animation: spin .75s linear infinite;
  margin: 0 auto 1rem;
}
.state-text {
  font-size: .78rem;
  font-weight: 300;
  color: rgba(248,245,238,.45);
  letter-spacing: .08em;
}
.empty-glyph {
  font-family: 'Cormorant Garamond', serif;
  font-size: 3rem;
  font-weight: 300;
  color: rgba(11,29,58,.15);
  margin-bottom: .75rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── REVEAL ─── */
[data-reveal] {
  opacity: 0;
  transform: translateY(16px);
  transition: opacity .55s ease, transform .55s ease;
}
[data-reveal].visible { opacity: 1; transform: translateY(0); }

/* ─── FOOTER ─── */
.site-footer {
  position: relative;
  z-index: 20;
  text-align: center;
  padding: 1.5rem;
  font-size: .65rem;
  font-weight: 300;
  letter-spacing: .1em;
  color: rgba(248,245,238,.35);
  border-top: 1px solid rgba(196,164,90,.25);
}
.site-footer strong { color: var(--gold); font-weight: 400; }

/* ─── MOBILE ─── */
@media (max-width: 620px) {
  .site-header, .controls-bar, .main { padding-left: 1.25rem; padding-right: 1.25rem; }
  .card-footer { flex-direction: column; }
  .btn-expand { width: 100%; justify-content: center; }
  .answer-row { flex-direction: column; align-items: stretch; }
  .btn-check { width: 100%; }
  .header-title { font-size: 2.4rem; }
}

  inset: 0;
  z-index: 0;
  pointer-events: none;

  background-size: cover;
  background-position: right center;

  transform: translateZ(0);

#bgDim {
  position: absolute;
  inset: 0;
  background: rgba(5,13,26,.60);
}

  position: relative;
  z-index: 10;
}

<body>



<div id="bgWrap">
  <div id="bgImg"></div>
  <div id="bgDim"></div>
</div>

<div id="pageContent">
<!-- HEADER -->
<header class="site-header">
  <div class="header-eyebrow">
    <span class="eyebrow-line"></span>
    <span class="eyebrow-text">Instituto MD Talk &nbsp;·&nbsp; TMEP</span>
  </div>
  <h1 class="header-title">Listening <em>Hub</em></h1>
  <p class="header-sub">Curated audio tracks for English practice — organised by subject, with transcripts and comprehension checks.</p>
  <div class="header-rule"></div>
</header>

<!-- CONTROLS -->
<div class="controls-bar">
  <div class="controls-search">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Search by title or topic…" autocomplete="off">
  </div>
  <span class="filter-sep"></span>
  <div class="filter-pills" id="filterPills">
    <button class="pill active" data-filter="all">All</button>
  </div>
</div>

<!-- MAIN -->
<main class="main" id="mainContent">
  <div class="state-container">
    <div class="spinner"></div>
    <p class="state-text">Loading audio library…</p>
  </div>
</main>

<footer class="site-footer">
  <strong>MD Talk</strong> &nbsp;·&nbsp; Listening Hub &nbsp;·&nbsp; All rights reserved
</footer>

<script>


/* ══════════════════════════════════════════════
   WAVEFORM SVG
══════════════════════════════════════════════ */
function makeWave() {
  const bars = 18;
  const heights = Array.from({length:bars}, () => 20 + Math.random() * 60);
  const paths = heights.map((h, i) => {
    const x = i * 3.2;
    const y = (80 - h) / 2;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="2" height="${h.toFixed(1)}" rx="1"/>`;
  }).join('');
  return `<svg class="card-wave" viewBox="0 0 58 80" fill="none" xmlns="http://www.w3.org/2000/svg">
    <g fill="rgba(11,29,58,0.15)">${paths}</g>
  </svg>`;
}

/* ══════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════ */
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxAjBvDp7lCOOVbtyJaoiRulKf0GoDFgsLZj4W6Rc6kLawC4ITZSwXzsBVsd17hZd6Bbw/exec';

const CAT_LABELS = {
  'regular':  'Regular English',
  'medical':  'Medical English',
  'business': 'Business English',
};
const CAT_ORDER = ['regular','medical','business'];



let allAudios = [];
let activeFilter = 'all';

/* FETCH — Google Sheets via Apps Script */
async function loadAudios() {
  try {
    const res = await fetch(SHEET_URL + '?type=audios&t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allAudios = data.filter(r => r.category && r.title && r.drive_file_id);
    buildPills();
    renderAll();
  } catch (err) {
    document.getElementById('mainContent').innerHTML = `
      <div class="state-container">
        <div class="empty-glyph">&#9671;</div>
        <p class="state-text">Unable to load the audio library.<br>Check your connection or contact your instructor.</p>
      </div>`;
    console.error('Listening Hub load error:', err);
  }
}

/* ══════════════════════════════════════════════
   PILLS
══════════════════════════════════════════════ */
function buildPills() {
  const pills = document.getElementById('filterPills');
  const cats = CAT_ORDER.filter(c => allAudios.some(a => a.category === c));
  pills.querySelectorAll('[data-filter]:not([data-filter="all"])').forEach(b => b.remove());
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'pill';
    btn.dataset.filter = cat;
    btn.textContent = CAT_LABELS[cat] || cat;
    btn.addEventListener('click', () => setFilter(cat));
    pills.appendChild(btn);
  });
}

function setFilter(v) {
  activeFilter = v;
  document.querySelectorAll('.pill').forEach(b =>
    b.classList.toggle('active', b.dataset.filter === v));
  renderAll();
}
document.querySelector('[data-filter="all"]').addEventListener('click', () => setFilter('all'));
document.getElementById('searchInput').addEventListener('input', () => renderAll());

/* ══════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════ */
function renderAll() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = allAudios.filter(a => {
    const lm = activeFilter === 'all' || a.category === activeFilter;
    const qm = !q || a.title.toLowerCase().includes(q)
      || (a.description||'').toLowerCase().includes(q)
      || (a.transcript||'').toLowerCase().includes(q);
    return lm && qm;
  });

  const main = document.getElementById('mainContent');

  if (!filtered.length) {
    main.innerHTML = `<div class="state-container">
      <div class="empty-glyph">&#9671;</div>
      <p class="state-text">No audio tracks found for this selection.</p>
    </div>`;
    return;
  }

  const groups = {};
  filtered.forEach(a => { (groups[a.category] = groups[a.category]||[]).push(a); });
  const sorted = CAT_ORDER.filter(c => groups[c]);

  main.innerHTML = sorted.map(cat => {
    const items = groups[cat];
    return `<section class="level-section" data-reveal>
      <div class="level-heading">
        <span class="level-code">${CAT_LABELS[cat]||cat}</span>
        <div class="level-info">
          <span class="level-count">${items.length} track${items.length!==1?'s':''}</span>
        </div>
        <span class="level-divider"></span>
      </div>
      <div class="audio-grid">${items.map((a,i) => cardHTML(a,i)).join('')}</div>
    </section>`;
  }).join('');

  attachEvents();
  observeReveal();
}

/* ══════════════════════════════════════════════
   CARD HTML
══════════════════════════════════════════════ */
function cardHTML(a, idx) {
  const id = 'c_' + esc(a.title).replace(/[^a-z0-9]/gi,'').slice(0,20) + idx;
  const src = `https://drive.google.com/uc?export=download&id=${a.drive_file_id}`;
  const hasTx = !!(a.transcript && a.transcript.trim());


  return `<div class="audio-card">
    <audio id="audio_${id}" preload="none" src="${src}"></audio>

    <!-- COLLAPSED HEADER — always visible -->
    <div class="card-header-row" data-card-toggle>
      <h3 class="card-title">${esc(a.title)}</h3>
      ${makeWave()}
      <svg class="card-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>

    <!-- EXPANDABLE BODY -->
    <div class="card-collapsible">
      ${a.description ? `<p class="card-desc">${esc(a.description)}</p>` : ''}

      <div class="card-player-section">
        <div class="player-wrap">
          <button class="btn-play" data-audio="audio_${id}" aria-label="Play">
            <svg viewBox="0 0 24 24" class="icon-play" style="display:block"><polygon points="5,3 19,12 5,21"/></svg>
            <svg viewBox="0 0 24 24" class="icon-pause" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </button>
          <div class="player-controls">
            <div class="progress-track" data-audio="audio_${id}">
              <div class="progress-fill"></div>
              <div class="progress-thumb"></div>
            </div>
            <div class="player-meta">
              <span class="player-time" id="time_${id}">0:00 / 0:00</span>
              <button class="player-speed" data-audio="audio_${id}">1×</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card-footer">
        ${hasTx ? `<button class="btn-expand" data-target="tx_${id}">
          <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg> Transcript
        </button>` : ''}
        ${hasQ ? `<button class="btn-expand" data-target="qs_${id}">
          <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg> Comprehension Check
        </button>` : ''}
      </div>

      ${hasTx ? `<div class="panel" id="tx_${id}">
        <div class="panel-inner">
          <p class="panel-label">Transcript</p>
          <p class="transcript-body">${esc(a.transcript)}</p>
        </div>
      </div>` : ''}

    </div>
  </div>`;
}

/* ══════════════════════════════════════════════
   EVENTS
══════════════════════════════════════════════ */
const speeds = [1, 1.25, 1.5, 0.75];

function attachEvents() {
  /* toggle card open/close */
  document.querySelectorAll('[data-card-toggle]').forEach(header => {
    header.addEventListener('click', () => {
      const card = header.closest('.audio-card');
      const wasOpen = card.classList.contains('is-open');
      card.classList.toggle('is-open', !wasOpen);
      // pause audio if closing
      if (wasOpen) {
        const audio = card.querySelector('audio');
        if (audio && !audio.paused) audio.pause();
      }
    });
  });

  /* expand sub-panels (transcript / questions) */
  document.querySelectorAll('.btn-expand').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const p = document.getElementById(btn.dataset.target);
      if (!p) return;
      const open = p.classList.toggle('open');
      btn.classList.toggle('active', open);
    });
  });

  /* play/pause */
  document.querySelectorAll('.btn-play').forEach(btn => {
    const audio = document.getElementById(btn.dataset.audio);
    if (!audio) return;
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (audio.paused) {
        document.querySelectorAll('audio').forEach(a => { if (a !== audio) { a.pause(); syncPlay(a, false); } });
        audio.play();
      } else { audio.pause(); }
    });
    audio.addEventListener('play',  () => syncPlay(audio, true));
    audio.addEventListener('pause', () => syncPlay(audio, false));
    audio.addEventListener('ended', () => syncPlay(audio, false));
    audio.addEventListener('timeupdate', () => updateProgress(audio));
    audio.addEventListener('loadedmetadata', () => updateProgress(audio));
  });

  /* progress seek */
  document.querySelectorAll('.progress-track').forEach(track => {
    const audio = document.getElementById(track.dataset.audio);
    if (!audio) return;
    track.addEventListener('click', e => {
      e.stopPropagation();
      const rect = track.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      audio.currentTime = pct * (audio.duration || 0);
    });
  });

  /* speed */
  document.querySelectorAll('.player-speed').forEach(btn => {
    let idx = 0;
    const audio = document.getElementById(btn.dataset.audio);
    if (!audio) return;
    btn.addEventListener('click', () => {
      idx = (idx + 1) % speeds.length;
      audio.playbackRate = speeds[idx];
      btn.textContent = speeds[idx] + '×';
    });
  });


}

function syncPlay(audio, playing) {
  const btn = document.querySelector(`.btn-play[data-audio="${audio.id}"]`);
  if (!btn) return;
  btn.querySelector('.icon-play').style.display  = playing ? 'none'  : 'block';
  btn.querySelector('.icon-pause').style.display = playing ? 'block' : 'none';
}

function updateProgress(audio) {
  const track = document.querySelector(`.progress-track[data-audio="${audio.id}"]`);
  const timeEl = document.getElementById(audio.id.replace('audio_','time_'));
  if (!track) return;
  const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  track.querySelector('.progress-fill').style.width = pct + '%';
  track.querySelector('.progress-thumb').style.left = pct + '%';
  if (timeEl) timeEl.textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration||0);
}

function fmt(s) {
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m + ':' + String(sec).padStart(2,'0');
}



/* ══════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════ */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}


function observeReveal() {
  const obs = new IntersectionObserver(es => {
    es.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
  }, { threshold: .08 });
  document.querySelectorAll('[data-reveal]').forEach(el => obs.observe(el));
}

loadAudios();
</script>
</div>
</body>
</html>
