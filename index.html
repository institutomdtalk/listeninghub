<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audio Test</title>
<style>
  body { font-family: sans-serif; padding: 2rem; background: #f5f5f5; }
  input { width: 400px; padding: .5rem; margin-right: .5rem; }
  button { padding: .5rem 1rem; cursor: pointer; }
  #log { margin-top: 1.5rem; background: #fff; border: 1px solid #ddd; padding: 1rem; border-radius: 4px; white-space: pre-wrap; font-size: .85rem; min-height: 100px; }
  audio { display: block; margin-top: 1rem; width: 100%; }
</style>
</head>
<body>
<h2>Audio Test — MD Talk</h2>

<p>Cole o FILE_ID de um áudio do Drive:</p>
<input id="fileId" placeholder="ex: 1bYN6SJzz4403LWKgIpJdhhHgGei75GYf" />
<button onclick="testAudio()">Test</button>

<audio id="player" controls></audio>
<div id="log">Aguardando...</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxAjBvDp7lCOOVbtyJaoiRulKf0GoDFgsLZj4W6Rc6kLawC4ITZSwXzsBVsd17hZd6Bbw/exec';

function log(msg) {
  const el = document.getElementById('log');
  el.textContent += '\n' + new Date().toISOString().slice(11,19) + ' ' + msg;
}

function extractId(raw) {
  if (!raw) return '';
  raw = raw.trim();
  if (!/[/?&]/.test(raw)) return raw;
  let m = raw.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return m[1];
  m = raw.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m) return m[1];
  m = raw.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return m[1];
  return raw;
}

async function testAudio() {
  const raw    = document.getElementById('fileId').value.trim();
  const fileId = extractId(raw);
  if (!fileId) { log('ERROR: Cole o file ID'); return; }
  log('Extracted ID: ' + fileId);

  document.getElementById('log').textContent = '';
  log('Fetching from Apps Script...');

  try {
    const url = SHEET_URL + '?type=audioblob&id=' + fileId;
    log('URL: ' + url);

    const res = await fetch(url);
    log('HTTP status: ' + res.status);
    log('Content-Type: ' + res.headers.get('content-type'));

    const text = await res.text();
    log('Response length: ' + text.length + ' chars');
    log('Response preview: ' + text.slice(0, 200));

    let json;
    try {
      json = JSON.parse(text);
    } catch(e) {
      log('ERROR: Could not parse JSON — ' + e.message);
      return;
    }

    if (json.error) { log('ERROR from server: ' + json.error); return; }

    log('File name: ' + (json.name || 'unknown'));
    log('MIME type: ' + (json.mime || 'unknown'));
    log('Base64 length: ' + (json.b64 ? json.b64.length : 0));

    if (!json.b64) { log('ERROR: No b64 data'); return; }

    log('Decoding base64...');
    try {
      const binary = atob(json.b64);
      const bytes  = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const blob    = new Blob([bytes], { type: json.mime || 'audio/mpeg' });
      const blobUrl = URL.createObjectURL(blob);

      log('Blob size: ' + blob.size + ' bytes');
      log('Blob type: ' + blob.type);
      log('Blob URL: ' + blobUrl);

      const player = document.getElementById('player');
      player.src = blobUrl;
      player.load();
      log('Player src set. Try playing above.');

    } catch(e) {
      log('ERROR decoding: ' + e.message);
    }

  } catch(err) {
    log('FETCH ERROR: ' + err.message);
  }
}
</script>
</body>
</html>
